<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather v6 - Split Screen Duel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #111; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .title-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 30px; border-bottom: 2px solid #333;
        }
        .title-bar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; }
        .title-bar .prog { font-size: 0.8rem; color: #888; }
        .prog-dots { display: flex; gap: 6px; }
        .prog-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: background 0.3s; }
        .prog-dot.done { background: #e94560; }
        .prog-dot.active { background: #fff; box-shadow: 0 0 8px #fff; }

        /* Split screen layout */
        .split-screen {
            display: flex; min-height: 100vh; padding-top: 54px;
        }
        .split-side {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px; cursor: pointer; transition: all 0.3s; position: relative;
        }
        .split-side:hover { flex: 1.3; }
        .split-side:hover .side-text { transform: scale(1.05); }
        .side-left { background: linear-gradient(135deg, #e94560, #c0392b); }
        .side-right { background: linear-gradient(135deg, #2980b9, #3498db); }
        .side-text {
            font-size: 1.4rem; font-weight: 700; text-align: center;
            max-width: 320px; line-height: 1.6; transition: transform 0.3s;
        }
        .side-label {
            position: absolute; top: 80px; font-family: 'Bebas Neue', sans-serif;
            font-size: 5rem; opacity: 0.1; letter-spacing: 10px;
        }
        .side-left .side-label { left: 30px; }
        .side-right .side-label { right: 30px; }
        .vs-circle {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; border-radius: 50%;
            background: #111; border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
            z-index: 5; letter-spacing: 2px;
        }
        .q-label {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 0.75rem; color: #888; letter-spacing: 3px; text-transform: uppercase; z-index: 5;
        }

        /* Results overlay */
        .results {
            display: none; position: fixed; inset: 0; z-index: 20;
            background: #111; overflow-y: auto; padding: 80px 20px 40px;
        }
        .results-inner { max-width: 600px; margin: 0 auto; }
        .results h2 { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; text-align: center; letter-spacing: 6px; margin-bottom: 6px; }
        .results .subtitle { text-align: center; color: #666; margin-bottom: 36px; }
        .personality-banner {
            background: linear-gradient(135deg, #e94560, #c0392b);
            border-radius: 20px; padding: 40px; text-align: center; margin-bottom: 24px;
        }
        .personality-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 4px; margin-bottom: 10px; }
        .personality-desc { font-size: 1rem; line-height: 1.7; opacity: 0.9; }
        .stats-flex { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-pill {
            flex: 1; background: #1a1a1a; border-radius: 14px; padding: 20px; text-align: center;
        }
        .stat-pill .num { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: #e94560; }
        .stat-pill .lbl { font-size: 0.7rem; color: #666; margin-top: 2px; }
        .answer-log { background: #1a1a1a; border-radius: 16px; padding: 24px; }
        .answer-log h3 { font-size: 0.85rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
        .log-item { padding: 12px 0; border-bottom: 1px solid #222; font-size: 0.9rem; color: #aaa; line-height: 1.6; }
        .log-item:last-child { border-bottom: none; }
        .log-item span { color: #e94560; font-weight: 700; }
        .restart-btn {
            display: block; width: 100%; padding: 18px; margin-top: 20px;
            border-radius: 50px; border: none; background: #e94560; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer;
        }
        .restart-btn:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="title-bar">
        <h1>WOULD YOU RATHER</h1>
        <div class="prog-dots" id="dots"></div>
    </div>

    <div class="split-screen" id="game">
        <div class="split-side side-left" onclick="pick('A')">
            <div class="side-label">A</div>
            <div class="side-text" id="optA"></div>
        </div>
        <div class="vs-circle">VS</div>
        <div class="split-side side-right" onclick="pick('B')">
            <div class="side-label">B</div>
            <div class="side-text" id="optB"></div>
        </div>
    </div>
    <div class="q-label" id="q-label">Question 1 of 10</div>

    <div class="results" id="results">
        <div class="results-inner">
            <h2>VERDICT</h2>
            <p class="subtitle">Your choices have been weighed and measured.</p>
            <div class="personality-banner">
                <div class="personality-title" id="p-title"></div>
                <p class="personality-desc" id="p-desc"></p>
            </div>
            <div class="stats-flex">
                <div class="stat-pill"><div class="num" id="stat-chaotic">0</div><div class="lbl">Chaotic</div></div>
                <div class="stat-pill"><div class="num" id="stat-safe">0</div><div class="lbl">Safe</div></div>
                <div class="stat-pill"><div class="num" id="stat-unhinged">0</div><div class="lbl">Unhinged %</div></div>
            </div>
            <div class="answer-log">
                <h3>Your Choices</h3>
                <div id="choices-log"></div>
            </div>
            <button class="restart-btn" onclick="restart()">Play Again</button>
        </div>
    </div>

    <script>
    var questions=[
        {a:"Have Michael Scott as your boss for life",b:"Eat only gas station sushi forever",chaotic:"B",tagA:"Cringe management accepted",tagB:"Your stomach just resigned"},
        {a:"Fight 100 duck-sized horses",b:"Fight 1 horse-sized duck",chaotic:"B",tagA:"Quantity play",tagB:"Boss battle selected"},
        {a:"Dwight Schrute as your roommate",b:"Ross Geller as your therapist",chaotic:"A",tagA:"Beet farm roomie life",tagB:"WE WERE ON A BREAK (every session)"},
        {a:"Only speak in movie quotes for a year",b:"Laugh track after everything you say",chaotic:"A",tagA:"\"Here's Johnny!\" — you, at work",tagB:"Your wedding vows get a laugh track"},
        {a:"Elevator with Sheldon Cooper, 8 hours",b:"Gordon Ramsay roasts you on live TV",chaotic:"B",tagA:"Fun facts. No escape.",tagB:"IT'S RAWWW (your entire personality)"},
        {a:"Ron Swanson's mustache permanently",b:"Kramer's hair permanently",chaotic:"B",tagA:"Peak authority energy",tagB:"Every entrance is slapstick"},
        {a:"No phone for a year",b:"No shower for 3 months",chaotic:"B",tagA:"Disconnected. Brave. Alone.",tagB:"Social distancing enforced by odor"},
        {a:"Morgan Freeman narrates you (passive-aggressively)",b:"Hype man follows you (always wrong)",chaotic:"B",tagA:"\"He reheated pizza. For breakfast. Again.\"",tagB:"\"HE'S NAILING THIS PRESENTATION!\" (you're on the wrong slide)"},
        {a:"Live in The Office universe",b:"Live in Parks and Rec universe",chaotic:"A",tagA:"Scranton forever. By choice.",tagB:"Pawnee: at least there's waffles"},
        {a:"GoT theme every time you sit",b:"DUN DUN every time you stand",chaotic:"A",tagA:"Every toilet trip is a coronation",tagB:"Standing up at a funeral: DUN DUN"}
    ];
    var current=0,answers=[],chaoticCount=0;
    function buildDots(){var h='';for(var i=0;i<questions.length;i++)h+='<div class="prog-dot" id="dot'+i+'"></div>';document.getElementById('dots').innerHTML=h;}
    function updateDots(){for(var i=0;i<questions.length;i++){var d=document.getElementById('dot'+i);d.className='prog-dot';if(i<current)d.classList.add('done');if(i===current)d.classList.add('active');}}
    function showQuestion(){var q=questions[current];document.getElementById('optA').textContent=q.a;document.getElementById('optB').textContent=q.b;document.getElementById('q-label').textContent='Question '+(current+1)+' of '+questions.length;updateDots();}
    function pick(choice){var q=questions[current],c=choice===q.chaotic;if(c)chaoticCount++;answers.push({num:current+1,chose:choice==='A'?q.a:q.b,tag:choice==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
    function showResults(){document.getElementById('game').style.display='none';document.getElementById('q-label').style.display='none';document.querySelector('.vs-circle').style.display='none';document.getElementById('results').style.display='block';var s=questions.length-chaoticCount,p=Math.round(chaoticCount/questions.length*100);document.getElementById('stat-chaotic').textContent=chaoticCount;document.getElementById('stat-safe').textContent=s;document.getElementById('stat-unhinged').textContent=p+'%';var t,d;if(p>=80){t="THE ABSOLUTE MENACE";d="Michael Scott energy at maximum. Every choice was a masterclass in chaos. You'd fight the horse-sized duck and try to ride it into battle. Your friends are concerned but entertained.";}else if(p>=60){t="CONTROLLED CHAOS";d="Chandler Bing vibes — sarcastic exterior, questionable decisions underneath. You dance with chaos but occasionally remember rent is due. You'd survive a horror movie by confusing the killer.";}else if(p>=40){t="BALANCED WILDCARD";d="Jake Peralta energy — mostly fun, sometimes responsible. 'A lot, but in a good way' is what your friends tell other people. They're being generous.";}else if(p>=20){t="CALCULATED PLAYER";d="Ron Swanson mode activated. Practical. Deliberate. Suspicious of fun. You've read the terms and conditions of this quiz. You'll outlive us all.";}else{t="HUMAN SAFETY MANUAL";d="Hermione Granger would find you 'a bit much.' You treated this quiz like a final exam. Pick the duck next time. Experience joy.";}document.getElementById('p-title').textContent=t;document.getElementById('p-desc').textContent=d;var l='';for(var i=0;i<answers.length;i++)l+='<div class="log-item">'+(i+1)+'. <span>'+answers[i].chose+'</span><br>'+answers[i].tag+'</div>';document.getElementById('choices-log').innerHTML=l;}
    function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='flex';document.getElementById('q-label').style.display='block';document.querySelector('.vs-circle').style.display='flex';document.getElementById('results').style.display='none';showQuestion();}
    buildDots();showQuestion();
    </script>
</body>
</html>
