<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather? — v18</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:48px 20px;}
.container{width:100%;max-width:560px;}
h1{font-size:1.6rem;font-weight:700;color:#1a1a1a;letter-spacing:-0.5px;border-bottom:3px solid #1a1a1a;display:inline-block;padding-bottom:4px;}
.subtitle{font-size:0.8rem;color:#888;margin-bottom:32px;margin-top:8px;}
.progress{display:flex;gap:0;margin-bottom:32px;border:2px solid #1a1a1a;}
.prog-cell{flex:1;height:6px;background:#e8e8e4;transition:background 0.3s;}
.prog-cell.done{background:#e94560;}
.prog-cell.active{background:#e94560;opacity:0.5;}
.q-number{font-size:0.7rem;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.q-text{font-size:0.85rem;color:#999;margin-bottom:20px;}
.option{display:block;width:100%;padding:18px 20px;margin-bottom:10px;background:#ffffff;border:2px solid #1a1a1a;border-radius:0;color:#1a1a1a;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.15s;text-align:left;}
.option:hover{background:#e94560;color:#ffffff;border-color:#e94560;}
.option:active{transform:scale(0.98);}
.or-text{font-size:0.7rem;color:#bbb;text-transform:uppercase;letter-spacing:3px;margin:4px 0;text-align:center;}

/* Results */
#results{display:none;}
.verdict-label{font-size:0.65rem;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;}
.persona-title{font-size:2.2rem;font-weight:700;color:#1a1a1a;margin-bottom:6px;letter-spacing:-1px;}
.persona-desc{font-size:0.9rem;color:#777;margin-bottom:32px;line-height:1.6;}
.stats{display:flex;gap:0;margin-bottom:32px;border:2px solid #1a1a1a;}
.stat{flex:1;padding:16px 10px;text-align:center;background:#fff;}
.stat+.stat{border-left:2px solid #1a1a1a;}
.stat-val{font-size:1.5rem;font-weight:700;color:#e94560;}
.stat-label{font-size:0.6rem;color:#999;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.log-title{font-size:0.65rem;font-weight:700;color:#1a1a1a;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;border-bottom:2px solid #1a1a1a;display:inline-block;padding-bottom:2px;}
.log-item{padding:10px 14px;background:#ffffff;border:2px solid #e8e8e4;margin-bottom:6px;font-size:0.82rem;line-height:1.5;}
.log-item .num{color:#e94560;font-weight:700;margin-right:4px;}
.log-item .tag{display:block;color:#aaa;font-size:0.72rem;margin-top:2px;}
.btn-again{display:inline-block;margin-top:28px;padding:14px 40px;background:#1a1a1a;border:2px solid #1a1a1a;color:#ffffff;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.15s;border-radius:0;}
.btn-again:hover{background:#e94560;border-color:#e94560;}
</style>
</head>
<body>
<div class="container">
  <div id="game">
    <h1>Would You Rather?</h1>
    <p class="subtitle">10 dilemmas. No good answers.</p>
    <div class="progress" id="progress"></div>
    <p class="q-number" id="qNum"></p>
    <p class="q-text">Would you rather…</p>
    <button class="option" id="optA" onclick="pick('A')"></button>
    <div class="or-text">or</div>
    <button class="option" id="optB" onclick="pick('B')"></button>
  </div>
  <div id="results">
    <p class="verdict-label">Your Verdict</p>
    <p class="persona-title" id="pTitle"></p>
    <p class="persona-desc" id="pDesc"></p>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="sChaotic"></div><div class="stat-label">Chaotic</div></div>
      <div class="stat"><div class="stat-val" id="sSafe"></div><div class="stat-label">Safe</div></div>
      <div class="stat"><div class="stat-val" id="sUnhinged"></div><div class="stat-label">Unhinged</div></div>
    </div>
    <p class="log-title">Choice Log</p>
    <div id="log"></div>
    <button class="btn-again" onclick="restart()">Play Again</button>
  </div>
</div>
<script>
var questions=[{a:"Have Michael Scott as your boss for life",b:"Eat only gas station sushi forever",chaotic:"B",tagA:"Chose cringe management",tagB:"Chose food poisoning"},{a:"Fight 100 duck-sized horses",b:"Fight 1 horse-sized duck",chaotic:"B",tagA:"Swarm strategy",tagB:"Boss battle"},{a:"Dwight Schrute as your roommate",b:"Ross Geller as your therapist",chaotic:"A",tagA:"Bears. Beets. No boundaries.",tagB:"Three divorces per session"},{a:"Only speak in movie quotes",b:"Laugh track after everything",chaotic:"A",tagA:"Cinematic conversations",tagB:"Sitcom life unlocked"},{a:"8hrs elevator with Sheldon",b:"Gordon Ramsay roasts you live",chaotic:"B",tagA:"Physics lecture, no exit",tagB:"National humiliation"},{a:"Ron Swanson's mustache forever",b:"Kramer's hair forever",chaotic:"B",tagA:"Authority energy",tagB:"Slapstick life"},{a:"No phone for a year",b:"No shower for 3 months",chaotic:"B",tagA:"Disconnected but clean",tagB:"Connected but alone"},{a:"Passive-aggressive Morgan Freeman",b:"Wrong hype man",chaotic:"B",tagA:"Narrated disappointment",tagB:"Misplaced enthusiasm"},{a:"Live in The Office universe",b:"Live in Parks and Rec universe",chaotic:"A",tagA:"Scranton forever",tagB:"Pawnee forever"},{a:"GoT theme when you sit",b:"DUN DUN when you stand",chaotic:"A",tagA:"Cinematic seating",tagB:"Legal standing"}];
var current=0,answers=[],chaoticCount=0;
function buildProgress(){var p=document.getElementById('progress');p.innerHTML='';for(var i=0;i<questions.length;i++){var d=document.createElement('div');d.className='prog-cell'+(i<current?' done':'')+(i===current?' active':'');p.appendChild(d);}}
function showQuestion(){var q=questions[current];document.getElementById('qNum').textContent='Question '+(current+1)+' / '+questions.length;document.getElementById('optA').textContent=q.a;document.getElementById('optB').textContent=q.b;buildProgress();}
function pick(c){var q=questions[current],ch=c===q.chaotic;if(ch)chaoticCount++;answers.push({num:current+1,chose:c==='A'?q.a:q.b,tag:c==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
function showResults(){document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';var pct=Math.round(chaoticCount/questions.length*100);var t,d;if(pct>=80){t='The Absolute Menace';d='Michael Scott energy, pure chaos, would fight the duck and ride it';}else if(pct>=60){t='Controlled Chaos';d='Chandler Bing coded, sarcastic, somehow functional';}else if(pct>=40){t='Balanced Wildcard';d='Jake Peralta energy, fun, occasionally responsible';}else if(pct>=20){t='The Strategist';d='Ron Swanson incarnate, practical, suspicious of joy';}else{t='Safety Manual';d='Hermione Granger energy, chose every safe option';}
document.getElementById('pTitle').textContent=t;document.getElementById('pDesc').textContent=d;document.getElementById('sChaotic').textContent=chaoticCount;document.getElementById('sSafe').textContent=(questions.length-chaoticCount);document.getElementById('sUnhinged').textContent=pct+'%';var log=document.getElementById('log');log.innerHTML='';for(var i=0;i<answers.length;i++){var a=answers[i];log.innerHTML+='<div class="log-item"><span class="num">Q'+a.num+'</span>'+a.chose+'<span class="tag">'+a.tag+'</span></div>';}}
function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='block';document.getElementById('results').style.display='none';showQuestion();}
showQuestion();
</script>
</body>
</html>
