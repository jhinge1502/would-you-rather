<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather? — v16</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#e8e0d4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.container{width:100%;max-width:560px;}
.card{background:#1a1714;border:1px solid #2a2520;border-radius:16px;padding:40px 36px;text-align:center;}
h1{font-size:1.6rem;font-weight:800;color:#f0a030;margin-bottom:6px;letter-spacing:-0.5px;}
.subtitle{font-size:0.85rem;color:#887a68;margin-bottom:28px;}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:32px;}
.dot{width:10px;height:10px;border-radius:50%;background:#2a2520;transition:background 0.3s,transform 0.3s;}
.dot.done{background:#f0a030;}
.dot.active{background:#f0a030;transform:scale(1.3);}
.q-number{font-size:0.75rem;font-weight:700;color:#f0a030;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.q-label{font-size:0.75rem;color:#665d50;margin-bottom:20px;}
.option{display:block;width:100%;padding:18px 20px;margin-bottom:12px;background:transparent;border:1px solid #2a2520;border-radius:12px;color:#e8e0d4;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:left;}
.option:hover{border-color:#f0a030;background:#1f1b15;transform:translateY(-1px);}
.option:active{transform:scale(0.98);}
.or-divider{font-size:0.7rem;color:#55504a;text-transform:uppercase;letter-spacing:3px;margin:4px 0 8px;}

/* Results */
#results{display:none;}
.results-card{background:#1a1714;border:1px solid #2a2520;border-radius:16px;padding:40px 36px;text-align:center;}
.persona-title{font-size:1.8rem;font-weight:800;color:#f0a030;margin-bottom:4px;}
.persona-desc{font-size:0.9rem;color:#a09080;margin-bottom:28px;line-height:1.5;}
.stat-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:24px;}
.stat-box{flex:1;background:#141210;border:1px solid #2a2520;border-radius:10px;padding:14px 10px;text-align:center;}
.stat-val{font-size:1.4rem;font-weight:800;color:#f0a030;}
.stat-label{font-size:0.65rem;color:#665d50;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.log-title{font-size:0.7rem;color:#665d50;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.log-item{text-align:left;padding:10px 14px;background:#141210;border:1px solid #2a2520;border-radius:8px;margin-bottom:6px;font-size:0.8rem;line-height:1.4;}
.log-item span{color:#f0a030;font-weight:700;}
.log-item em{color:#665d50;font-style:normal;font-size:0.72rem;}
.btn-again{display:inline-block;margin-top:24px;padding:14px 36px;background:#f0a030;color:#0f0f0f;font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;}
.btn-again:hover{background:#fdb040;transform:translateY(-1px);}
</style>
</head>
<body>
<div class="container">
  <div id="game">
    <div class="card">
      <h1>Would You Rather?</h1>
      <p class="subtitle">10 dilemmas. No good answers.</p>
      <div class="dots" id="dots"></div>
      <p class="q-number" id="qNum"></p>
      <p class="q-label">Would you rather…</p>
      <button class="option" id="optA" onclick="pick('A')"></button>
      <div class="or-divider">— or —</div>
      <button class="option" id="optB" onclick="pick('B')"></button>
    </div>
  </div>
  <div id="results">
    <div class="results-card">
      <p class="q-number">Your Verdict</p>
      <p class="persona-title" id="pTitle"></p>
      <p class="persona-desc" id="pDesc"></p>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-val" id="sChaotic"></div><div class="stat-label">Chaotic</div></div>
        <div class="stat-box"><div class="stat-val" id="sSafe"></div><div class="stat-label">Safe</div></div>
        <div class="stat-box"><div class="stat-val" id="sUnhinged"></div><div class="stat-label">Unhinged</div></div>
      </div>
      <p class="log-title">Your Choices</p>
      <div id="log"></div>
      <button class="btn-again" onclick="restart()">Play Again</button>
    </div>
  </div>
</div>
<script>
var questions=[{a:"Have Michael Scott as your boss for life",b:"Eat only gas station sushi forever",chaotic:"B",tagA:"Chose cringe management",tagB:"Chose food poisoning"},{a:"Fight 100 duck-sized horses",b:"Fight 1 horse-sized duck",chaotic:"B",tagA:"Swarm strategy",tagB:"Boss battle"},{a:"Dwight Schrute as your roommate",b:"Ross Geller as your therapist",chaotic:"A",tagA:"Bears. Beets. No boundaries.",tagB:"Three divorces per session"},{a:"Only speak in movie quotes",b:"Laugh track after everything",chaotic:"A",tagA:"Cinematic conversations",tagB:"Sitcom life unlocked"},{a:"8hrs elevator with Sheldon",b:"Gordon Ramsay roasts you live",chaotic:"B",tagA:"Physics lecture, no exit",tagB:"National humiliation"},{a:"Ron Swanson's mustache forever",b:"Kramer's hair forever",chaotic:"B",tagA:"Authority energy",tagB:"Slapstick life"},{a:"No phone for a year",b:"No shower for 3 months",chaotic:"B",tagA:"Disconnected but clean",tagB:"Connected but alone"},{a:"Passive-aggressive Morgan Freeman",b:"Wrong hype man",chaotic:"B",tagA:"Narrated disappointment",tagB:"Misplaced enthusiasm"},{a:"Live in The Office universe",b:"Live in Parks and Rec universe",chaotic:"A",tagA:"Scranton forever",tagB:"Pawnee forever"},{a:"GoT theme when you sit",b:"DUN DUN when you stand",chaotic:"A",tagA:"Cinematic seating",tagB:"Legal standing"}];
var current=0,answers=[],chaoticCount=0;
function buildDots(){var d=document.getElementById('dots');d.innerHTML='';for(var i=0;i<questions.length;i++){var s=document.createElement('span');s.className='dot'+(i<current?' done':'')+(i===current?' active':'');d.appendChild(s);}}
function showQuestion(){var q=questions[current];document.getElementById('qNum').textContent='Question '+(current+1)+' of '+questions.length;document.getElementById('optA').textContent=q.a;document.getElementById('optB').textContent=q.b;buildDots();}
function pick(c){var q=questions[current],ch=c===q.chaotic;if(ch)chaoticCount++;answers.push({num:current+1,chose:c==='A'?q.a:q.b,tag:c==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
function showResults(){document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';var pct=Math.round(chaoticCount/questions.length*100);var t,d;if(pct>=80){t='The Absolute Menace';d='Michael Scott energy, pure chaos, would fight the duck and ride it';}else if(pct>=60){t='Controlled Chaos';d='Chandler Bing coded, sarcastic, somehow functional';}else if(pct>=40){t='Balanced Wildcard';d='Jake Peralta energy, fun, occasionally responsible';}else if(pct>=20){t='The Strategist';d='Ron Swanson incarnate, practical, suspicious of joy';}else{t='Safety Manual';d='Hermione Granger energy, chose every safe option';}
document.getElementById('pTitle').textContent=t;document.getElementById('pDesc').textContent=d;document.getElementById('sChaotic').textContent=chaoticCount;document.getElementById('sSafe').textContent=(questions.length-chaoticCount);document.getElementById('sUnhinged').textContent=pct+'%';var log=document.getElementById('log');log.innerHTML='';for(var i=0;i<answers.length;i++){var a=answers[i];log.innerHTML+='<div class="log-item"><span>Q'+a.num+':</span> '+a.chose+' <br><em>'+a.tag+'</em></div>';}}
function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='block';document.getElementById('results').style.display='none';showQuestion();}
showQuestion();
</script>
</body>
</html>
