<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather v15 - Glassmorphism + Gradient Split</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 40px 20px; color: #fff;
        }
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 4px; }
        h1 span { background: linear-gradient(90deg,#f7971e,#ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .tagline { font-size: 0.9rem; opacity: 0.4; margin-bottom: 40px; }
        .container { max-width: 620px; width: 100%; }

        .glass {
            background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
        }
        .prog-row { display: flex; gap: 5px; margin-bottom: 16px; }
        .prog-pip { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); transition: all 0.3s; }
        .prog-pip.done { background: linear-gradient(90deg,#f7971e,#ffd200); }
        .prog-pip.active { background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }
        .q-info { text-align: center; font-size: 0.75rem; opacity: 0.3; margin-bottom: 20px; letter-spacing: 2px; }

        .card { padding: 40px 30px; text-align: center; }
        .wyr-label { font-size: 0.75rem; opacity: 0.4; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        .options-stack { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            padding: 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #fff;
            font-family: 'Inter', sans-serif; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; text-align: left; line-height: 1.5;
            display: flex; align-items: center; gap: 16px;
        }
        .opt-btn:first-child:hover {
            background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3));
            border-color: rgba(102,126,234,0.5); transform: translateX(6px);
        }
        .opt-btn:last-child:hover {
            background: linear-gradient(135deg, rgba(240,147,251,0.3), rgba(245,87,108,0.3));
            border-color: rgba(240,147,251,0.5); transform: translateX(6px);
        }
        .opt-key {
            min-width: 36px; height: 36px; border-radius: 10px;
            background: rgba(255,255,255,0.08); display: flex; align-items: center;
            justify-content: center; font-size: 0.8rem; font-weight: 800; color: #888;
        }
        .opt-btn:hover .opt-key { background: rgba(255,255,255,0.15); color: #fff; }
        .or-sep { text-align: center; font-size: 0.7rem; opacity: 0.2; letter-spacing: 4px; padding: 2px 0; }

        .results { display: none; }
        .results h2 { font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 4px; }
        .results h2 span { background: linear-gradient(90deg,#f7971e,#ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .results .sub { text-align: center; opacity: 0.3; margin-bottom: 24px; }
        .verdict-glass {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(240,147,251,0.2));
            backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px; padding: 36px; text-align: center; margin-bottom: 18px;
        }
        .verdict-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px;
            background: linear-gradient(90deg,#f7971e,#ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .verdict-desc { font-size: 0.95rem; line-height: 1.7; opacity: 0.85; }
        .stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .stat-glass { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; text-align: center; }
        .stat-glass .num { font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg,#f093fb,#f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-glass .lbl { font-size: 0.65rem; opacity: 0.3; margin-top: 2px; }
        .log-glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 22px; }
        .log-glass h3 { font-size: 0.75rem; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
        .log-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; opacity: 0.6; line-height: 1.5; }
        .log-item:last-child { border-bottom: none; }
        .log-item span { opacity: 1; background: linear-gradient(90deg,#f093fb,#f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
        .restart-btn {
            display: block; width: 100%; padding: 18px; margin-top: 18px;
            border-radius: 50px; border: none;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0f0c29; font-family: 'Inter', sans-serif;
            font-size: 1rem; font-weight: 800; cursor: pointer;
        }
        .restart-btn:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(247,151,30,0.3); }
    </style>
</head>
<body>
    <h1>Would You <span>Rather</span></h1>
    <p class="tagline">10 dilemmas. 1 verdict. No mercy.</p>
    <div class="container">
        <div id="game">
            <div class="prog-row" id="prog-row"></div>
            <div class="q-info" id="q-info">01 / 10</div>
            <div class="glass card">
                <div class="wyr-label">Would You Rather</div>
                <div class="options-stack">
                    <button class="opt-btn" id="optA" onclick="pick('A')"><div class="opt-key">A</div><span id="txtA"></span></button>
                    <div class="or-sep">OR</div>
                    <button class="opt-btn" id="optB" onclick="pick('B')"><div class="opt-key">B</div><span id="txtB"></span></button>
                </div>
            </div>
        </div>
        <div class="results" id="results">
            <h2>Your <span>Verdict</span></h2>
            <p class="sub">analyzed and judged accordingly</p>
            <div class="verdict-glass"><div class="verdict-title" id="p-title"></div><p class="verdict-desc" id="p-desc"></p></div>
            <div class="stat-row">
                <div class="stat-glass"><div class="num" id="stat-chaotic">0</div><div class="lbl">Chaotic</div></div>
                <div class="stat-glass"><div class="num" id="stat-safe">0</div><div class="lbl">Safe</div></div>
                <div class="stat-glass"><div class="num" id="stat-unhinged">0</div><div class="lbl">Unhinged %</div></div>
            </div>
            <div class="log-glass"><h3>Your Choices</h3><div id="choices-log"></div></div>
            <button class="restart-btn" onclick="restart()">Play Again</button>
        </div>
    </div>
    <script>
    var questions=[{a:"Have Michael Scott as your boss for life",b:"Eat only gas station sushi forever",chaotic:"B",tagA:"Chose cringe management",tagB:"Chose food poisoning"},{a:"Fight 100 duck-sized horses",b:"Fight 1 horse-sized duck",chaotic:"B",tagA:"Swarm strategy",tagB:"Boss battle"},{a:"Dwight Schrute as your roommate",b:"Ross Geller as your therapist",chaotic:"A",tagA:"Bears. Beets. No boundaries.",tagB:"Three divorces per session"},{a:"Only speak in movie quotes",b:"Laugh track after everything",chaotic:"A",tagA:"Cinematic conversations",tagB:"Sitcom life unlocked"},{a:"8hrs elevator with Sheldon",b:"Gordon Ramsay roasts you live",chaotic:"B",tagA:"Physics lecture, no exit",tagB:"National humiliation"},{a:"Ron Swanson's mustache forever",b:"Kramer's hair forever",chaotic:"B",tagA:"Authority energy",tagB:"Slapstick life"},{a:"No phone for a year",b:"No shower for 3 months",chaotic:"B",tagA:"Disconnected but clean",tagB:"Connected but alone"},{a:"Passive-aggressive Morgan Freeman",b:"Wrong hype man",chaotic:"B",tagA:"Narrated disappointment",tagB:"Misplaced enthusiasm"},{a:"Live in The Office universe",b:"Live in Parks and Rec universe",chaotic:"A",tagA:"Scranton forever",tagB:"Pawnee forever"},{a:"GoT theme when you sit",b:"DUN DUN when you stand",chaotic:"A",tagA:"Cinematic seating",tagB:"Legal standing"}];
    var current=0,answers=[],chaoticCount=0;
    function buildProg(){var h='';for(var i=0;i<questions.length;i++)h+='<div class="prog-pip" id="pp'+i+'"></div>';document.getElementById('prog-row').innerHTML=h;}
    function updateProg(){for(var i=0;i<questions.length;i++){var p=document.getElementById('pp'+i);p.className='prog-pip';if(i<current)p.classList.add('done');if(i===current)p.classList.add('active');}}
    function showQuestion(){var q=questions[current];document.getElementById('q-info').textContent=(current+1<10?'0':'')+(current+1)+' / '+questions.length;document.getElementById('txtA').textContent=q.a;document.getElementById('txtB').textContent=q.b;updateProg();}
    function pick(c){var q=questions[current],ch=c===q.chaotic;if(ch)chaoticCount++;answers.push({num:current+1,chose:c==='A'?q.a:q.b,tag:c==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
    function showResults(){document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';var s=questions.length-chaoticCount,p=Math.round(chaoticCount/questions.length*100);document.getElementById('stat-chaotic').textContent=chaoticCount;document.getElementById('stat-safe').textContent=s;document.getElementById('stat-unhinged').textContent=p+'%';var t,d;if(p>=80){t="The Absolute Menace";d="Michael Scott energy at maximum output. Every choice was unhinged. You'd fight the duck, ride it, and post about it. Iconic.";}else if(p>=60){t="Controlled Chaos";d="Chandler Bing coded — sarcastic, unpredictable, somehow functional. You flirt with disaster but keep your receipts.";}else if(p>=40){t="Balanced Wildcard";d="Jake Peralta energy. Fun, surprising, occasionally adulting. 'A lot but in a good way' — your friends, being generous.";}else if(p>=20){t="The Strategist";d="Ron Swanson incarnate. Practical, deliberate, suspicious of whimsy. You brought analytics to a personality quiz.";}else{t="Safety Manual";d="Hermione Granger says 'a bit much.' You chose every safe option like your grade depended on it. It didn't.";}document.getElementById('p-title').textContent=t;document.getElementById('p-desc').textContent=d;var l='';for(var i=0;i<answers.length;i++)l+='<div class="log-item">'+(i+1)+'. <span>'+answers[i].chose+'</span> — '+answers[i].tag+'</div>';document.getElementById('choices-log').innerHTML=l;}
    function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='block';document.getElementById('results').style.display='none';buildProg();showQuestion();}
    buildProg();showQuestion();
    </script>
</body>
</html>
