<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather v5 - Gradient Party</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; color: #fff;
        }
        h1 {
            font-size: 3rem; font-weight: 900;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 4px;
        }
        .tagline { font-size: 1rem; opacity: 0.7; margin-bottom: 40px; }
        .container { max-width: 650px; width: 100%; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; margin-bottom: 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f7971e, #ffd200); border-radius: 4px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.8rem; opacity: 0.5; margin-bottom: 20px; }
        .question-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 40px; text-align: center;
        }
        .question-num { font-size: 0.8rem; opacity: 0.6; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; }
        .question-text { font-size: 1rem; opacity: 0.7; margin-bottom: 28px; }
        .option-btn {
            display: block; width: 100%; padding: 22px 24px;
            border: none; border-radius: 16px;
            font-family: 'Poppins', sans-serif; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; line-height: 1.5; color: #fff;
        }
        .option-btn:first-of-type { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .option-btn:last-of-type { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #1a1a1a; }
        .option-btn:hover { transform: scale(1.03); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .vs { font-size: 1.3rem; font-weight: 800; opacity: 0.4; margin: 14px 0; }
        /* Results */
        .results { display: none; }
        .results h2 { font-size: 2.2rem; font-weight: 900; text-align: center; margin-bottom: 4px; }
        .results .subtitle { text-align: center; opacity: 0.6; margin-bottom: 28px; }
        .personality-card {
            border-radius: 24px; padding: 36px; text-align: center; margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        .personality-title {
            font-size: 1.8rem; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .personality-desc { font-size: 1rem; line-height: 1.7; opacity: 0.95; }
        .stat-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .stat-box {
            flex: 1; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 20px; text-align: center;
        }
        .stat-num { font-size: 2rem; font-weight: 900; }
        .stat-label { font-size: 0.7rem; opacity: 0.5; margin-top: 4px; }
        .choices-list {
            background: rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; margin-top: 12px;
        }
        .choices-list h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; opacity: 0.8; }
        .choice-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; opacity: 0.8; line-height: 1.6; }
        .choice-item:last-child { border-bottom: none; }
        .choice-item span { color: #ffd200; font-weight: 600; }
        .restart-btn {
            display: block; width: 100%; padding: 16px; margin-top: 20px;
            border-radius: 50px; border: none;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a1a; font-family: 'Poppins', sans-serif;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
        }
        .restart-btn:hover { transform: scale(1.02); }
        .disclaimer { text-align: center; font-size: 0.7rem; opacity: 0.3; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Would You Rather</h1>
    <p class="tagline">10 dilemmas. 0 good options. 1 personality roast.</p>
    <div class="container">
        <div id="game">
            <div class="progress-text" id="prog-text">1 of 10</div>
            <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
            <div class="question-card">
                <div class="question-num" id="q-num">Question 1</div>
                <p class="question-text">Would you rather...</p>
                <button class="option-btn" id="optA" onclick="pick('A')"></button>
                <div class="vs">OR</div>
                <button class="option-btn" id="optB" onclick="pick('B')"></button>
            </div>
        </div>
        <div class="results" id="results">
            <h2>Your Verdict</h2>
            <p class="subtitle">We've analyzed your terrible decisions...</p>
            <div class="personality-card">
                <div class="personality-title" id="p-title"></div>
                <p class="personality-desc" id="p-desc"></p>
            </div>
            <div class="stat-row">
                <div class="stat-box"><div class="stat-num" id="stat-chaotic">0</div><div class="stat-label">Chaotic</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-safe">0</div><div class="stat-label">Safe</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-unhinged">0</div><div class="stat-label">Unhinged %</div></div>
            </div>
            <div class="choices-list">
                <h3>Your Choices</h3>
                <div id="choices-log"></div>
            </div>
            <button class="restart-btn" onclick="restart()">Play Again</button>
        </div>
    </div>
    <p class="disclaimer">This quiz has no scientific basis whatsoever. You're welcome.</p>
    <script>
    var questions = [
        { a:"Have Michael Scott as your boss for life", b:"Eat only gas station sushi forever", chaotic:"B", tagA:"At least he has a World's Best Boss mug", tagB:"Food poisoning speedrun unlocked" },
        { a:"Fight 100 duck-sized horses", b:"Fight 1 horse-sized duck", chaotic:"B", tagA:"Tiny hooves. Maximum chaos.", tagB:"One. Giant. Quack. Good luck." },
        { a:"Dwight Schrute as your roommate", b:"Ross Geller as your therapist", chaotic:"A", tagA:"Bears. Beets. No personal boundaries.", tagB:"He'll make every session about Rachel." },
        { a:"Only speak in movie quotes for a year", b:"Laugh track after everything you say", chaotic:"A", tagA:"\"I'll be back\" — you, leaving every meeting", tagB:"Your breakup speech gets a sitcom laugh" },
        { a:"Stuck in elevator with Sheldon, 8 hours", b:"Roasted by Gordon Ramsay on live TV", chaotic:"B", tagA:"He WILL quiz you on trains.", tagB:"\"This person is RAWWW!\" — Gordon, probably" },
        { a:"Ron Swanson's mustache forever", b:"Kramer's hair forever", chaotic:"B", tagA:"You are now everyone's cool uncle", tagB:"*slides through door* every single day" },
        { a:"No phone for a year", b:"No shower for 3 months", chaotic:"B", tagA:"Digital detox. Involuntary.", tagB:"You'll have so much personal space." },
        { a:"Passive-aggressive Morgan Freeman narration", b:"Hype man who's always wrong", chaotic:"B", tagA:"\"He ate cereal for dinner. Again. Charming.\"", tagB:"\"THIS MAN IS ABOUT TO ACE THIS INTERVIEW!\" (you're lost)" },
        { a:"Live in The Office universe", b:"Live in Parks and Rec universe", chaotic:"A", tagA:"Welcome to Scranton. Forever. Congrats.", tagB:"Li'l Sebastian makes it worth it." },
        { a:"GoT theme every time you sit", b:"DUN DUN every time you stand", chaotic:"A", tagA:"The Iron Throne, but it's your desk chair", tagB:"Every morning alarm: you stand up, DUN DUN" }
    ];
    var current=0,answers=[],chaoticCount=0;
    function showQuestion(){var q=questions[current];document.getElementById('q-num').textContent='Question '+(current+1);document.getElementById('prog-text').textContent=(current+1)+' of '+questions.length;document.getElementById('prog-fill').style.width=(current/questions.length*100)+'%';document.getElementById('optA').textContent=q.a;document.getElementById('optB').textContent=q.b;}
    function pick(choice){var q=questions[current],c=choice===q.chaotic;if(c)chaoticCount++;answers.push({num:current+1,chose:choice==='A'?q.a:q.b,tag:choice==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
    function showResults(){document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';var s=questions.length-chaoticCount,p=Math.round(chaoticCount/questions.length*100);document.getElementById('stat-chaotic').textContent=chaoticCount;document.getElementById('stat-safe').textContent=s;document.getElementById('stat-unhinged').textContent=p+'%';var t,d;if(p>=80){t="The Absolute Menace";d="You are the Michael Scott of decisions — pure chaos energy wrapped in misplaced confidence. You'd fight the duck AND try to befriend it. Your friends are concerned. Your therapist needs a therapist.";}else if(p>=60){t="Controlled Chaos Agent";d="Chandler Bing energy — sarcastic shell, questionable core. You flirt with chaos but sometimes remember adulting exists. You'd survive a horror movie because the killer is genuinely confused by you.";}else if(p>=40){t="The Balanced Wildcard";d="Jake Peralta vibes — mostly fun, occasionally responsible, always unexpected. 'A lot, but in a good way' is what your friends say when you're not around. Debatable.";}else if(p>=20){t="The Calculated Player";d="Ron Swanson mode — deliberate, practical, and deeply suspicious of joy. You've read the terms of service. All of them. You brought a pro/con list to this quiz.";}else{t="Human Safety Manual";d="Hermione Granger thinks you're 'a bit much.' You chose every safe option like it was a life-or-death exam. It's a fun internet quiz. Please touch grass.";}document.getElementById('p-title').textContent=t;document.getElementById('p-desc').textContent=d;var l='';for(var i=0;i<answers.length;i++)l+='<div class="choice-item">'+(i+1)+'. <span>'+answers[i].chose+'</span><br>'+answers[i].tag+'</div>';document.getElementById('choices-log').innerHTML=l;}
    function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='block';document.getElementById('results').style.display='none';showQuestion();}
    showQuestion();
    </script>
</body>
</html>
