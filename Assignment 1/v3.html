<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather v3 - Magazine Editorial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #faf7f2;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 4px; }
        .tagline { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; }
        .container { max-width: 700px; width: 100%; }
        .progress-bar { height: 3px; background: #e0dcd5; margin-bottom: 6px; }
        .progress-fill { height: 100%; background: #1a1a1a; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.7rem; color: #aaa; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
        .question-card { border: 2px solid #1a1a1a; padding: 50px 40px; text-align: center; }
        .question-num { font-size: 0.65rem; color: #c0392b; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
        .question-text { font-size: 0.9rem; color: #999; margin-bottom: 30px; font-style: italic; }
        .vs { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #ccc; margin: 16px 0; font-style: italic; }
        .option-btn {
            display: block; width: 100%; padding: 22px 28px;
            border: 2px solid #1a1a1a; background: #fff;
            font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; line-height: 1.6; color: #1a1a1a;
        }
        .option-btn:hover { background: #1a1a1a; color: #faf7f2; }
        .results { display: none; }
        .results h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; text-align: center; margin-bottom: 4px; }
        .results .subtitle { text-align: center; font-size: 0.8rem; color: #aaa; margin-bottom: 30px; font-style: italic; }
        .personality-card { border: 2px solid #1a1a1a; padding: 40px; text-align: center; margin-bottom: 20px; background: #1a1a1a; color: #faf7f2; }
        .personality-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #e8c547; margin-bottom: 12px; }
        .personality-desc { font-size: 1rem; line-height: 1.8; font-weight: 300; color: #ccc; }
        .stat-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .stat-box { flex: 1; border: 2px solid #1a1a1a; padding: 20px; text-align: center; }
        .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900; }
        .stat-label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
        .choices-list { border-top: 3px double #1a1a1a; padding-top: 20px; margin-top: 16px; }
        .choices-list h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 14px; }
        .choice-item { padding: 12px 0; border-bottom: 1px solid #e0dcd5; font-size: 0.9rem; color: #666; line-height: 1.6; }
        .choice-item:last-child { border-bottom: none; }
        .choice-item span { color: #c0392b; font-weight: 400; }
        .restart-btn {
            display: block; width: 100%; padding: 16px; margin-top: 20px;
            background: #1a1a1a; color: #faf7f2; border: none;
            font-family: 'Playfair Display', serif; font-size: 1rem; cursor: pointer; letter-spacing: 2px;
        }
        .restart-btn:hover { background: #333; }
        .footer { text-align: center; font-size: 0.6rem; color: #bbb; margin-top: 30px; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>Would You Rather</h1>
    <p class="tagline">A study in impossible choices</p>
    <div class="container">
        <div id="game">
            <div class="progress-text" id="prog-text">Dilemma I of X</div>
            <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
            <div class="question-card">
                <div class="question-num" id="q-num">Dilemma I</div>
                <p class="question-text">Would you rather...</p>
                <button class="option-btn" id="optA" onclick="pick('A')"></button>
                <div class="vs">— or —</div>
                <button class="option-btn" id="optB" onclick="pick('B')"></button>
            </div>
        </div>
        <div class="results" id="results">
            <h2>The Verdict</h2>
            <p class="subtitle">A personality, revealed through poor decisions</p>
            <div class="personality-card">
                <div class="personality-title" id="p-title"></div>
                <p class="personality-desc" id="p-desc"></p>
            </div>
            <div class="stat-row">
                <div class="stat-box"><div class="stat-num" id="stat-chaotic">0</div><div class="stat-label">Chaotic</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-safe">0</div><div class="stat-label">Safe</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-unhinged">0</div><div class="stat-label">Unhinged</div></div>
            </div>
            <div class="choices-list">
                <h3>Your Selections</h3>
                <div id="choices-log"></div>
            </div>
            <button class="restart-btn" onclick="restart()">Begin Again</button>
        </div>
    </div>
    <p class="footer">Not a peer-reviewed study &bull; Probably not legally binding</p>
    <script>
    var roman=['I','II','III','IV','V','VI','VII','VIII','IX','X'];
    var questions = [
        { a:"Have Michael Scott as your boss for the rest of your life", b:"Eat only gas station sushi forever", chaotic:"B", tagA:"Management by cringe. Bold.", tagB:"Your stomach filed a restraining order." },
        { a:"Fight 100 duck-sized horses", b:"Fight 1 horse-sized duck", chaotic:"B", tagA:"Strategic. Overwhelming.", tagB:"You chose single combat. Respect." },
        { a:"Have Dwight Schrute as your roommate", b:"Have Ross Geller as your therapist", chaotic:"A", tagA:"Beets. Bears. Battlestar Galactica. Daily.", tagB:"Three divorces. He'll relate to everything." },
        { a:"Only communicate in movie quotes for a year", b:"Have a laugh track after everything you say", chaotic:"A", tagA:"\"You can't handle the truth!\" — you, at brunch", tagB:"Your eulogy gets a laugh track." },
        { a:"Be stuck in an elevator with Sheldon Cooper for 8 hours", b:"Be roasted by Gordon Ramsay on live TV", chaotic:"B", tagA:"He'll explain string theory. All 8 hours.", tagB:"\"This is RAW!\" — him, about your life choices" },
        { a:"Have Ron Swanson's mustache permanently", b:"Have Kramer's hair permanently", chaotic:"B", tagA:"You now command respect everywhere.", tagB:"Every entrance is a physical comedy bit." },
        { a:"Give up your phone for a year", b:"Give up showering for 3 months", chaotic:"B", tagA:"Brave. Analog. Forgotten by friends.", tagB:"Your social circle will become very, very small." },
        { a:"Morgan Freeman narrates your life, passive-aggressively", b:"A hype man follows you, always slightly wrong", chaotic:"B", tagA:"\"He chose the cheaper wine. As expected.\"", tagB:"\"LOOK AT HIM NAILING THIS LEFT TURN!\" (wrong way)" },
        { a:"Live in The Office universe forever", b:"Live in Parks and Rec universe forever", chaotic:"A", tagA:"Scranton. By choice. Remarkable.", tagB:"Pawnee. Where government is... optional." },
        { a:"GoT theme plays every time you sit down", b:"Law & Order DUN DUN every time you stand up", chaotic:"A", tagA:"Dinner parties become cinematic events.", tagB:"Standing ovation? More like standing prosecution." }
    ];
    var current=0,answers=[],chaoticCount=0;
    function showQuestion(){var q=questions[current];document.getElementById('q-num').textContent='Dilemma '+roman[current];document.getElementById('prog-text').textContent='Dilemma '+roman[current]+' of '+roman[questions.length-1];document.getElementById('prog-fill').style.width=(current/questions.length*100)+'%';document.getElementById('optA').textContent=q.a;document.getElementById('optB').textContent=q.b;}
    function pick(choice){var q=questions[current],c=choice===q.chaotic;if(c)chaoticCount++;answers.push({num:current+1,chose:choice==='A'?q.a:q.b,tag:choice==='A'?q.tagA:q.tagB});current++;if(current<questions.length)showQuestion();else showResults();}
    function showResults(){document.getElementById('game').style.display='none';document.getElementById('results').style.display='block';var s=questions.length-chaoticCount,p=Math.round(chaoticCount/questions.length*100);document.getElementById('stat-chaotic').textContent=chaoticCount;document.getElementById('stat-safe').textContent=s;document.getElementById('stat-unhinged').textContent=p+'%';var t,d;if(p>=80){t="The Absolute Menace";d="You are the Michael Scott of decision-making — every choice a masterclass in chaos. You'd fight the horse-sized duck and try to ride it into battle. Unhinged. Iconic. Concerning.";}else if(p>=60){t="Controlled Chaos Agent";d="Chandler Bing energy — sarcastic exterior, questionable interior. You flirt with chaos but occasionally remember you have responsibilities. Barely.";}else if(p>=40){t="The Balanced Wildcard";d="Jake Peralta vibes — fun, surprising, occasionally responsible. Your friends call you 'a lot, but in a good way.' That's debatable.";}else if(p>=20){t="The Calculated Player";d="Ron Swanson incarnate — deliberate, practical, suspicious of fun. You brought a spreadsheet to this quiz. You'll outlive everyone.";}else{t="The Human Safety Manual";d="Hermione Granger would call you 'a bit much.' You chose every safe option like your life depended on it. It didn't. This is a quiz.";}document.getElementById('p-title').textContent=t;document.getElementById('p-desc').textContent=d;var l='';for(var i=0;i<answers.length;i++)l+='<div class="choice-item">'+roman[i]+'. <span>'+answers[i].chose+'</span><br>'+answers[i].tag+'</div>';document.getElementById('choices-log').innerHTML=l;}
    function restart(){current=0;answers=[];chaoticCount=0;document.getElementById('game').style.display='block';document.getElementById('results').style.display='none';showQuestion();}
    showQuestion();
    </script>
</body>
</html>
